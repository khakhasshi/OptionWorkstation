name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    env:
      CARGO_TARGET_DIR: ${{ github.workspace }}/rust-backend/target
    defaults:
      run:
        working-directory: rust-backend
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust-backend
      - run: cargo fmt --check
      - run: cargo test --locked
      - run: cargo clippy --locked --all-targets -- -D warnings
      - name: Check vendored Longbridge OAuth patch
        run: |
          cargo fmt --manifest-path ../vendor/longbridge-oauth/Cargo.toml --check
          cargo test --manifest-path ../vendor/longbridge-oauth/Cargo.toml
          cargo clippy --manifest-path ../vendor/longbridge-oauth/Cargo.toml --all-targets -- -D warnings

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm audit --audit-level=high

  python-reference:
    name: Python Reference Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - run: python -m pip install --requirement backend/requirements-dev.txt
      - run: python -m pytest -q

  publication:
    name: Publication Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.30.1
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl --fail --show-error --location \
            --output /tmp/gitleaks.tar.gz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          printf '%s  %s\n' "$GITLEAKS_SHA256" /tmp/gitleaks.tar.gz | sha256sum --check
          tar --extract --gzip --file /tmp/gitleaks.tar.gz --directory /tmp gitleaks
          sudo install --mode 0755 /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Scan Git history
        run: gitleaks git --redact --no-banner --log-level error
      - run: ./scripts/publication-check.sh

  licenses:
    name: License Metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: dtolnay/rust-toolchain@stable
      - run: npm ci
        working-directory: frontend
      - run: node scripts/license-inventory.mjs
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: ./rust-backend/Cargo.toml
          command: check bans licenses sources
