version: 2

updates:
  - package-ecosystem: cargo
    directory: /rust-backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      cargo-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: cargo
    directory: /vendor/longbridge-oauth
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: tuesday
    open-pull-requests-limit: 5
    groups:
      npm-minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 3

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
