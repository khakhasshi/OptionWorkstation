changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Breaking changes
      labels:
        - breaking
    - title: Features
      labels:
        - enhancement
    - title: Fixes
      labels:
        - bug
    - title: Data and model changes
      labels:
        - data-quality
    - title: Documentation and maintenance
      labels:
        - documentation
        - dependencies
    - title: Other changes
      labels:
        - "*"
