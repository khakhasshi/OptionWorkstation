name: Bug report
description: Report a reproducible software defect without sensitive data.
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, account identifiers, licensed market data, or unredacted screenshots.
        Security vulnerabilities must follow SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - Historical replay
        - Live analytics
        - Paper account monitor
        - Guide or documentation
        - Build or development
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic or redacted inputs.
      placeholder: |
        1. Start with ...
        2. Select ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and redacted logs
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: macOS 15, Chrome 138, Rust 1.x, Node 22
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, account data, licensed rows, and sensitive screenshots.
          required: true
        - label: This is not a security vulnerability.
          required: true
