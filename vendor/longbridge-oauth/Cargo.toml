[package]
name = "longbridge-oauth"
version = "4.4.1"
edition = "2024"
description = "Longbridge OpenAPI OAuth 2.0 client for Rust"
license = "MIT OR Apache-2.0"
repository = "https://github.com/longbridge/openapi"
publish = false

[features]
blocking = ["tokio/rt-multi-thread"]

[dependencies]
dirs = "6"
futures-util = "0.3.31"
longbridge-geo = "4.4.1"
oauth2 = { version = "5.0.0", default-features = false, features = ["reqwest", "rustls-tls"] }
poem = "3.1.12"
serde = { version = "1.0.219", features = ["derive"] }
serde_json = "1.0.142"
thiserror = "2.0.15"
tokio = { version = "1.47.1", features = ["rt", "time", "sync", "net"] }
tracing = "0.1.41"

[dev-dependencies]
tokio = { version = "1.47.1", features = ["rt-multi-thread", "macros"] }
